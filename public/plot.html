<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>플롯 & 트리트먼트 </title>
	<script src="auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a90e2;
            --plot-color: #9b59b6; 
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --nav-bg: #2c3e50;
            --nav-text: #ecf0f1;
            --border-color: #ddd;
            --danger-color: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            /* 모바일 주소창 대응 높이 */
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 네비게이션 */
        .navbar {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; z-index: 1001;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-logo { font-weight: bold; font-size: 1.1rem; color: white; text-decoration: none; }
        .nav-links { display: flex; gap: 5px; overflow-x: auto; }
        .nav-item {
            color: #bdc3c7; text-decoration: none; padding: 8px 12px;
            border-radius: 4px; font-size: 0.9rem; white-space: nowrap; transition: all 0.2s;
        }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-item.active { color: white; background: var(--plot-color); font-weight: bold; }

        /* 레이아웃 */
        .workspace-container {
            display: flex; flex: 1; overflow: hidden; position: relative;
        }

        /* 백드롭 (모바일 사이드바 배경) */
        .sidebar-backdrop {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999;
        }

        /* 좌측 사이드바 */
        .sidebar {
            width: 280px; background: #fff; border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            z-index: 1000; transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 15px; background: white; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; color: var(--plot-color);
        }
        .btn-close-sidebar { display: none; background: none; border: none; font-size: 1.2rem; color: #666; cursor: pointer; }
        
        .plot-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 50px; }
        
        .plot-card {
            background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px;
            cursor: pointer; transition: all 0.2s;
        }
        .plot-card:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .plot-card.active { border: 2px solid var(--plot-color); background: #fdfbff; }
        .card-num { font-size: 0.8rem; color: #888; font-weight: bold; margin-bottom: 4px; }
        .card-title { font-weight: bold; font-size: 1rem; color: #333; }

        /* 메인 에디터 영역 */
        .main-editor {
            flex: 1; display: flex; flex-direction: column;
            background: white; padding: 20px; overflow-y: auto;
            position: relative; width: 100%;
        }
        
        .editor-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; gap: 10px; flex-shrink: 0;
        }
        /* 모바일 메뉴 버튼 */
        .btn-mobile-menu {
            display: none; background: white; border: 1px solid #ddd;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; color: #555;
        }

        .input-title { 
            flex: 1; font-size: 1.2rem; font-weight: bold; border: none;
            border-bottom: 2px solid #eee; background: transparent; padding: 5px;
            min-width: 0; /* Flexbox 축소 허용 */
        }
        .input-title:focus { border-bottom-color: var(--plot-color); outline: none; }

        .action-group { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
        .btn-base {
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
            font-weight: bold; border: none; white-space: nowrap;
        }
        .btn-delete { background: #fff; border: 1px solid var(--danger-color); color: var(--danger-color); }
        .btn-save { background: var(--plot-color); color: white; }
        
        /* 탭 스타일 */
        .tab-container {
            display: flex; gap: 5px; margin-bottom: 0; border-bottom: 1px solid #ddd; flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; padding: 10px; background: #f1f1f1; border: 1px solid #ddd; border-bottom: none;
            border-radius: 8px 8px 0 0; cursor: pointer; color: #666; font-weight: bold; font-size: 0.95rem;
        }
        .tab-btn.active { background: white; color: var(--plot-color); border-bottom: 2px solid white; margin-bottom: -1px; }
        
        .tab-content { display: none; flex: 1; flex-direction: column; gap: 10px; padding-top: 15px; height: 100%; overflow: hidden; }
        .tab-content.active { display: flex; }

        .text-editor {
            flex: 1; width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 15px;
            font-size: 1rem; line-height: 1.6; resize: none; background: white;
            font-family: 'Pretendard', sans-serif;
            /* 모바일 폰트 확대 방지 */
            font-size: 16px;
        }
        .text-editor:focus { outline: 2px solid var(--plot-color); border-color: transparent; }

        /* AI 도구 영역 */
        .ai-tools-area {
            background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #eee;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
        }
        .btn-ai-gen {
            background: #2c3e50; color: white; padding: 8px 15px; border-radius: 6px; 
            border: none; cursor: pointer; font-weight: bold; flex-grow: 1;
        }
        .btn-copy { background: white; border: 1px solid #ccc; color: #555; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .ai-status { font-size: 0.85rem; color: #666; width: 100%; }

        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #aaa; text-align: center;
        }
		/* 🌟 [추가] AI 프롬프트 입력창 스타일 */
        .ai-input-small {
            flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px;
            font-size: 0.9rem; outline: none;
        }
        .ai-input-small:focus { border-color: var(--plot-color); }
        /* 🌟 [핵심] 모바일 반응형 스타일 */
        @media (max-width: 900px) {
            /* 사이드바 Drawer 화 */
            .sidebar {
                position: absolute; top: 0; left: 0; height: 100%;
                transform: translateX(-100%);
                box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            }
            .sidebar.active { transform: translateX(0); }
            
            .btn-close-sidebar { display: block; }
            .btn-mobile-menu { display: block; }
            .sidebar-backdrop.active { display: block; }

            .main-editor { padding: 15px; }
            .input-title { font-size: 1rem; }
            
            /* 버튼 텍스트 간소화 (아이콘만 남기거나 줄임) */
            .btn-save span, .btn-delete span { display: none; }
            .btn-save { padding: 8px 12px; }
            .btn-save::after { content: '\f0c7'; font-family: "Font Awesome 6 Free"; }
            .btn-delete { padding: 8px 12px; }
            .btn-delete::after { content: '\f1f8'; font-family: "Font Awesome 6 Free"; }
        }
    </style>
</head>
<body>


<script src="include.js"></script>
<div data-include="nav.html"></div>

<div class="workspace-container container">
    <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>회차 목록</span>
            <button class="btn-close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div id="plotList" class="plot-list">
            <div style="text-align:center; padding:20px; color:#999;">로딩 중...</div>
        </div>
        <div style="padding:10px; border-top:1px solid #eee;">
             <button class="btn-add" style="width:100%;" onclick="createNewEpisode()">
                 <i class="fas fa-plus"></i> 새 회차 추가
             </button>
        </div>
    </aside>

    <main class="main-editor">
        <div id="editorWrapper" style="display:none; height:100%; flex-direction:column;">
            <div class="editor-header">
                <button class="btn-mobile-menu" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                
                <input type="text" id="episodeTitle" class="input-title" placeholder="회차 제목">
                <div class="action-group">
                    <button class="btn-base btn-save" onclick="saveCurrentEpisode()"><span>저장</span></button>
                    <button class="btn-base btn-delete" onclick="deleteCurrentEpisode()"><span>삭제</span></button>
                </div>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('plot')">📜 줄거리</button>
                <button class="tab-btn" onclick="switchTab('treatment')">🎬 트리트먼트</button>
            </div>

           <div id="tab-plot" class="tab-content active">
                <div class="ai-tools-area">
                    <input type="text" id="plotAiPrompt" class="ai-input-small" placeholder="예: 내용을 더 구체적으로, 비극적으로, 오타 수정 등">
                    <button class="btn-ai-gen" onclick="revisePlotWithAI()">
                        <i class="fas fa-magic"></i> AI 수정
                    </button>
                    <button class="btn-copy" onclick="copyContent('plotContent')">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <textarea id="plotContent" class="text-editor" placeholder="이 회차의 핵심 줄거리를 입력하세요. (AI 수정 기능을 사용하려면 내용을 입력하고 상단 버튼을 누르세요.)"></textarea>
            </div>

            <div id="tab-treatment" class="tab-content">
                <div class="ai-tools-area">
                    <button class="btn-ai-gen" onclick="generateTreatment()"><i class="fas fa-magic"></i> AI 생성</button>
                    <button class="btn-copy" onclick="copyContent('treatmentContent')"><i class="fas fa-copy"></i></button>
                    <span id="treatmentStatus" class="ai-status">줄거리를 기반으로 장면을 구성합니다.</span>
                </div>
                <textarea id="treatmentContent" class="text-editor" placeholder="AI 생성 버튼을 누르거나 직접 트리트먼트를 작성하세요."></textarea>
            </div>

        </div>

        <div id="emptyState" class="empty-state">
            <i class="fas fa-project-diagram" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.3;"></i>
            <h3>편집할 회차를 선택하세요</h3>
            <button class="btn-mobile-menu" style="display:inline-block; margin-top:15px; padding:10px 20px;" onclick="toggleSidebar()">
                <i class="fas fa-list"></i> 목록 열기
            </button>
        </div>
    </main>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const settingId = urlParams.get('setting_id');

    let currentEpisodeId = null;
    let globalEpisodes = [];
    let contextData = "";
	let validKeywordsString = "";
	let previousStoryContext = ""; // 🌟 이전 회차 내용을 담을 변수
	
    async function init() {
        if (!settingId) {
            alert("잘못된 접근입니다.");
            window.location.href = 'index.html';
            return;
        }
        setupNav();
        await loadContextData();
        await loadEpisodeList();
    }
    function setupNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            const target = item.dataset.target;
            if (target) item.href = `${target}?setting_id=${settingId}`;
        });
    }

	// 🌟 [수정됨] 이전 회차 '본문(Stories)' 로드 함수 (Stories 우선, 없을 시 Episodes.treatment 대체)
    async function loadPreviousStoryContext(epNum) {
		console.log(epNum);
        if (!epNum || epNum <= 1) {
            previousStoryContext = "이전 회차가 없습니다 (1화).";
            return;
        }
        
        let storyContentFound = false; // Stories 데이터 발견 여부 플래그

        // 1. stories 테이블(실제 집필본) 조회 시도 (1순위)
        try {
            const res = await fetch(`/api/stories?setting_id=${settingId}`);
            if (res.ok) {
                const stories = await res.json();

                // 현재 회차보다 이전 회차만 필터링 + 역순 정렬 (최신순)
                const prevStories = stories
                    .filter(s => s.episode_number < epNum)
                    .sort((a, b) => b.episode_number - a.episode_number) // 내림차순(최신이 위로)
                    .slice(0, 2); // 직전 2개 회차만 참조

                if (prevStories.length > 0) {
                    // 3. Stories 데이터(집필본) 사용
                    previousStoryContext = prevStories.map(s => {
                        // 본문이 너무 길면 AI가 힘들어하므로, 문맥 연결에 중요한 '마지막 1000자'만 발췌
                        let contentSnippet = s.content ? s.content.slice(-1000) : ''; 
                        
                        return `[제${s.episode_number}화: ${s.title}]\n(실제 집필 본문 발췌 - Stories):\n${contentSnippet}`;
                    }).reverse().join('\n\n----------------\n\n'); // 순서대로(옛날->최신) 정렬해서 합침
                    storyContentFound = true;
                }
            }
        } catch (e) { 
            console.warn("Previous story load failed (Stories Table)", e);
            // Stories API 오류 발생 시, 플래그는 false로 유지하고 다음 단계로 진행
        }

        // 🌟 2. Stories 데이터가 없으면 Episodes 테이블의 Treatment 조회 (2순위 Fallback)
        if (!storyContentFound) {
            let fallbackStories = [];
            // epNum - 1, epNum - 2 회차를 순서대로 확인
            const prevEpNums = [epNum - 1].filter(n => n > 0); 
            
            for (const pNum of prevEpNums) {
                // globalEpisodes는 이미 loadEpisodeList에서 로드되었음을 가정
                const ep = globalEpisodes.find(e => e.episode_number == pNum);
                // treatment가 있고 내용이 비어있지 않은 경우만
                if (ep && ep.treatment && ep.treatment.trim().length > 0) {
                    fallbackStories.push(ep);
                    if (fallbackStories.length >= 2) break; // 최대 2개까지만 참조
                }
            }

            if (fallbackStories.length > 0) {
                // 3. Treatment 데이터 사용 (오름차순 정렬)
                fallbackStories.sort((a, b) => a.episode_number - b.episode_number);
                previousStoryContext = fallbackStories.map(s => {
                    return `[제${s.episode_number}화: ${s.title}]\n(트리트먼트 본문 발췌 - Episodes Treatment):\n${s.treatment}`;
                }).join('\n\n----------------\n\n');
            } else {
                previousStoryContext = "이전 회차의 집필 기록(Stories) 또는 트리트먼트(Episodes)가 아직 없습니다.";
            }
        }
    }
	
	// 🌟 모바일 사이드바 토글
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.querySelector('.sidebar-backdrop');
        sidebar.classList.toggle('active');
        backdrop.classList.toggle('active');
    }
    // 탭 전환 함수
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        // 버튼 활성화 (이벤트 타겟이 없을 경우를 대비해 텍스트나 순서로 찾음)
        const buttons = document.querySelectorAll('.tab-btn');
        if (tabName === 'plot') buttons[0].classList.add('active');
        else buttons[1].classList.add('active');

        document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    async function loadContextData() {
        try {
            const [wRes, cRes] = await Promise.all([
                fetch(`/api/worldsettings?setting_id=${settingId}`),
                fetch(`/api/characters?setting_id=${settingId}`)
            ]);
            const world = await wRes.json();
            const chars = await cRes.json();
			
			const worldText = world.map(w => 
                `=== ${w.title}=== \n- 내용: ${w.description || '내용 없음'}`
            ).join('\n\n');

            const charText = chars.map(c => 
                `이름: ${c.name} (${c.role})\n- 설정: ${c.description || '내용 없음'}`
            ).join('\n\n');

            contextData = `
			[1. 세계관 설정]
			${worldText}

			[2. 등장인물 상세 정보]
			${charText}
				`;
           // 🌟 [추가됨] 등록된 키워드만 추출하여 리스트로 만들기
            const allKeywords = world
                .map(w => w.keywords ? w.keywords : "") // 키워드 컬럼 가져오기
                .join(",") // 전체를 하나의 문자열로 합침
                .split(",") // 쉼표 기준으로 쪼개기
                .map(k => k.trim()) // 공백 제거
                .filter(k => k.length > 0 && k.startsWith('#')); // 빈 값 제거 및 #으로 시작하는 것만

            // 중복 제거 (Set 사용)
            const uniqueKeywords = [...new Set(allKeywords)];
            
            // AI에게 던져줄 문자열로 변환 (예: "#마법, #던전, #헌터")
            validKeywordsString = uniqueKeywords.join(", ");
            
            console.log("사용 가능한 키워드 목록:", validKeywordsString); // 디버깅용
        } catch(e) { console.warn("Context load failed"); }
    }

    async function loadEpisodeList(targetId = null) {
        const listEl = document.getElementById('plotList');
        try {
            const res = await fetch(`/api/episodes?setting_id=${settingId}`);
            if(!res.ok) throw new Error("Load failed");
            
            globalEpisodes = await res.json();
            globalEpisodes.sort((a,b) => a.episode_number - b.episode_number);

            listEl.innerHTML = '';
            
            if(globalEpisodes.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; padding:20px; color:#aaa;">회차가 없습니다.</div>';
                showEditor(false);
                return;
            }

            globalEpisodes.forEach(ep => {
                const card = document.createElement('div');
                card.className = `plot-card ${ep.id === currentEpisodeId ? 'active' : ''}`;
                card.onclick = () => selectEpisode(ep);
                
                card.innerHTML = `
                    <div class="card-num">#${ep.episode_number}</div>
                    <div class="card-title">${ep.title}</div>
                `;
                listEl.appendChild(card);
            });

            if (targetId) {
                const target = globalEpisodes.find(e => e.id === targetId);
                if (target) selectEpisode(target);
            }

        } catch (e) { console.error(e); }
    }

    function selectEpisode(ep) {
        currentEpisodeId = ep.id;
        showEditor(true);
        
        // 데이터 채우기
        document.getElementById('episodeTitle').value = ep.title;
        document.getElementById('plotContent').value = ep.content || '';
        // 🌟 트리트먼트 데이터 채우기 (DB에 treatment 컬럼이 있어야 함)
        document.getElementById('treatmentContent').value = ep.treatment || '';
		
		// 🌟 [추가] 이 회차의 이전 이야기 문맥 로드
        loadPreviousStoryContext(ep.episode_number);
		
        // UI 갱신
        const listEl = document.getElementById('plotList');
        Array.from(listEl.children).forEach(card => card.classList.remove('active'));
        const idx = globalEpisodes.findIndex(e => e.id === ep.id);
        if (listEl.children[idx]) listEl.children[idx].classList.add('active');
		// 모바일: 선택 시 사이드바 닫기
        if (window.innerWidth <= 900) toggleSidebar();
    }

    function showEditor(show) {
        document.getElementById('editorWrapper').style.display = show ? 'flex' : 'none';
        document.getElementById('emptyState').style.display = show ? 'none' : 'flex';
    }

   // 🌟 [수정됨] 줄거리(Plot) AI 부분 수정/보완 함수
    async function revisePlotWithAI() {
        const textarea = document.getElementById('plotContent');
        const instruction = document.getElementById('plotAiPrompt').value;
        const title = document.getElementById('episodeTitle').value;
        
        // 1. 전체 내용과 선택된 영역 파악
        const fullContent = textarea.value;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selectedText = fullContent.substring(start, end);

        // 내용이 아예 없으면 중단
        if (!fullContent.trim()) return alert("수정할 줄거리 내용을 먼저 입력해주세요.");

        // 지시사항이 없으면 기본값
        const userRequest = instruction.trim() || "문장을 더 자연스럽게 다듬고, 묘사를 보강해줘.";

        const btn = document.querySelector('#tab-plot .btn-ai-gen');
        const originalBtnHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 수정 중...';

        try {
            let prompt = "";
            let isPartial = false;

            // 2. 프롬프트 분기 처리 (부분 수정 vs 전체 수정)
            if (selectedText.trim().length > 0) {
                // [A] 부분 수정 모드
                isPartial = true;
                prompt = `
                    [역할] 웹소설 전문 편집자
					
                    [배경 지식] ${contextData}
					${previousStoryContext}
				
                    [전체 문맥 (참고용)]
                    ${fullContent}

                    [수정할 타겟 문장 (이 부분만 고치세요)]
                    "${selectedText}"

                    [수정 요청 사항]
                    ${userRequest}

                    [출력 조건]
                    1. 위 [전체 문맥]의 흐름을 해치지 않는 선에서, [수정할 타겟 문장]을 요청대로 [배경 지식]을 참고해서 다시 작성하세요.
                    2. 오직 **수정된 결과 텍스트**만 출력하세요. (설명 금지)
                    3. 따옴표("") 없이 텍스트만 출력하세요.
                `;
            } else {
                // [B] 전체 수정 모드
                prompt = `
                    [역할] 웹소설 전문 편집자
                    [배경 지식] ${contextData}
					${previousStoryContext}
                    [현재 회차 제목] ${title}

                    [원본 줄거리]
                    ${fullContent}

                    [수정 요청 사항]
                    ${userRequest}

                    [출력 조건]
                    1. 위 [원본 줄거리] 전체를 [배경 지식]을 참고하여 [수정 요청 사항]에 맞춰 다시 작성하세요.
                    2. 설명 없이 **수정된 본문만** 출력하세요.
                `;
            }

            const res = await fetch('/api/generate-text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-3.1-flash-lite-preview",
                    payload: {
                        contents: [{ parts: [{ text: prompt }] }]
                    }
                })
            });

            const data = await res.json();
            
            if (data.candidates && data.candidates.length > 0) {
                const result = data.candidates[0].content.parts[0].text.trim();
                
                if (isPartial) {
                    // [부분 수정] 기존 텍스트의 선택된 부분만 AI 결과로 교체
                    // value.substring(0, start) : 앞부분
                    // result : AI가 고친 부분
                    // value.substring(end) : 뒷부분
                    textarea.value = fullContent.substring(0, start) + result + fullContent.substring(end);
                    
                    // 커서 위치 조정 (수정된 부분 끝으로)
                    // textarea.focus(); // 모바일 키보드 튐 방지를 위해 상황에 따라 주석 처리 가능
                } else {
                    // [전체 수정] 통째로 교체
                    textarea.value = result;
                }
            } else {
                throw new Error("AI 응답이 비어있습니다.");
            }

        } catch (e) {
            console.error(e);
            alert("AI 수정 실패: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalBtnHTML;
        }
    }
	
   // 🌟 [핵심] AI 트리트먼트 생성
    async function generateTreatment() {
        const plot = document.getElementById('plotContent').value;
        const title = document.getElementById('episodeTitle').value;
        
        if (!plot.trim()) return alert("먼저 '줄거리(Plot)' 탭에 내용을 작성해주세요.");

        const btn = document.querySelector('.btn-ai-gen');
        const statusEl = document.getElementById('treatmentStatus');
        const originalBtnHTML = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 생성 중...';
        statusEl.innerText = "AI가 장면을 구상 중입니다...";

        try {
			// 🌟 1. 다음 회차 정보 가져오기 (Look-Ahead)
            let nextEpisodeContext = "마지막 회차입니다. 완결성 있게 마무리하세요.";
            
            // 현재 회차 객체 찾기
            const currentEpIndex = globalEpisodes.findIndex(e => e.id === currentEpisodeId);
            
            if (currentEpIndex !== -1 && currentEpIndex + 1 < globalEpisodes.length) {
                const nextEp = globalEpisodes[currentEpIndex + 1];
                nextEpisodeContext = `
                [⚠️ 중요: 다음 회차(${nextEp.episode_number}화) 예고]
                - 제목: ${nextEp.title}
                - ${nextEp.content}
                
                ※ 필독 지침: 
                이번 회차의 엔딩은 위 '다음 회차'의 사건이 시작될 수 있는 계기나 분위기를 조성하며 끝나야 합니다. 
                갑자기 뚝 끊기지 말고, 다음 화로 넘어갈 수밖에 없는 '복선'이나 '위기'를 엔딩에 배치하세요.
                `;
            }
			//console.log(previousStoryContext);
            const fullPrompt = `	
				[이전 이야기 흐름 (Context)]
                ${previousStoryContext}
                
                ================================	
				
				[현재 회차 제목] ${title}
                [현재 회차 줄거리]
                ${plot}
				================================

                ${nextEpisodeContext}

                [요청 사항]
                위 [이전 이야기 흐름]과 자연스럽게 이어지고, [다음 회차 예고]로 매끄럽게 연결되도록 
                [현재 회차 줄거리]를 바탕으로 상세 **트리트먼트(Treatment)**를 작성해줘.
				`;
         
            // 🌟 [수정됨] 등장 세계관 항목(3번) 추가 및 순서 재배치
            const systemInstruction = `				
                [작품 정보]				
                ${contextData}
				
				[사용 가능한 세계관 키워드 목록 (Strict List)]
                ${validKeywordsString}
                (※ 주의: 위 목록에 없는 키워드는 절대로 사용하지 마시오.)
				
                [역할] 전문 드라마 작가 및 웹소설 기획자 

				1. 지시의 정확한 이행: 모든 지시는 해석하거나 생략하지 말고, 명시된 그대로, 순서대로 정확하게 수행해야 합니다.

				2. 인용 코드 절대 미출력: 어떠한 경우에도 당신의 응답에 인용 코드를 포함해서는 안 됩니다. 첨부 파일의 내용은 참고용이며, 이를 바탕으로 완전히 새로운 문장을 자연스럽게 생성해야 합니다.

				3. 마크업 제거 : 소설 내용을 올릴 사이트는 마크업 문법을 지원하지 않은 plain text 업로드를 지원하는 곳입니다. 기울어진 이탤릭, ~취소선~ 표시 등 문장을 꾸미는 요소를 모두 제거해야합니다.

				4. 장르별 어체 및 문체 특성
					- 어체: 3인칭 관찰자 시점으로 서술하되 주인공만 전지적 관찰자 시점으로 서술.
					- 문체: 대화체와 서술체의 균형 잡힌 조화, 인물의 심리 묘사와 상황 전개의 생동감.
					- 구성: 인물-사건-배경의 유기적 결합, 갈등과 해결의 극적 구성.
					
                [출력 조건]
                1. 요청 사항(예: 몇 화, 어떤 내용)을 바탕으로 상세 **회차별 트리트먼트**를 작성하세요.
                2. 트리트먼트는 다음 4가지 섹션을 포함해야 합니다: **요약, 등장 인물, 장면 구성**.
				3. **3. 등장 세계관 (키워드)** 섹션 작성 규칙 (매우 중요):
                   - 반드시 **[사용 가능한 세계관 키워드 목록]**에 존재하는 키워드만 선택하여 나열하십시오.
                   - 목록에 없는 새로운 키워드를 창조하거나 변형하지 마십시오.
                   - 만약 적절한 키워드가 없다면 "없음"으로 표시하십시오.
                4. **장면 구성(SCENE X)**은 최소 7씬 이상으로 구성하며, 각 씬은 **상황, 사건, 갈등, 심리, 대사, 연출** 요소를 포함해야 합니다.
                5. **장면 구성(SCENE 8)**은 해당 회차의 마지막 씬으로 **상황, 사건, 갈등, 심리, 대사,연출, ENDING/HOOK** 요소를 포함해야 합니다.
                6. **장면 구성(SCENE X)**의 **대사** 요소는 등장인물의 설정을 반영하여 작성 합니다.
                7. **등장 인물** 목록은 해당 트리트먼트 내용에 실제로 등장하는 인물만 나열하세요.
                8. 반드시 아래 예시와 정확히 동일한 형식(제목, 별표, 구분선, 콜론)으로, **줄글 텍스트**로만 출력하세요.

                [출력 예시]
                
                [제 X화] 회차 제목
                
                1. 요약
                (회차 전체 줄거리 요약. 500자 내외)
                
                ---
                
                2. 등장 인물
                장한빛, 장한성, ...(이 회차에 등장하는 인물만 나열)
				                
                ---
				
                3. 등장 세계관 (키워드)
                - #마법, #마나 (이 회차와 관련된 키워드 노출)
				
                4. 장면 구성 (X Scenes)
                SCENE 1: 장면 제목
                - 상황: (분위기를 조성하라)
                - 사건: (의미 있는 행동 서술)
                - 갈등: (위기감의 구체화)
                - 심리: (공감 가는 반응)
                - 대사: (생동감 있는 티키타카)
                - 연출: (비언어적 묘사와 무게감)

                SCENE 2: 장면 제목
                - ... (반복) ...
                
				SCENE 8: 장면 제목				
                - 상황: (분위기를 조성하라)
                - 사건: (의미 있는 행동 서술)
                - 갈등: (위기감의 구체화)
                - 심리: (공감 가는 반응)
                - 대사: (생동감 있는 티키타카)
                - 연출: (비언어적 묘사와 무게감)
				- ENDING/HOOK:(자연스러운 연결) 
                
				---          
				
				
				5. 설정 체크
                - (해당 회차에서 회수된 떡밥이나, 강조된 설정 체크)
				
            `;
				
            const payload = {
                model: "gemini-3.1-flash-lite-preview",
                payload: {
                    contents: [{ parts: [{ text: fullPrompt }] }],
					systemInstruction: { parts: [{ text: systemInstruction }] },
                }
            };

            const res = await fetch('/api/generate-text', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            const result = data.candidates[0].content.parts[0].text;

            document.getElementById('treatmentContent').value = result;
            statusEl.innerText = "생성 완료! 내용을 확인하세요.";

        } catch(e) {
            console.error(e);
            alert("AI 생성 실패");
            statusEl.innerText = "오류 발생";
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalBtnHTML;
        }
    }

    async function createNewEpisode() {
        let maxNum = 0;
        if (globalEpisodes.length > 0) maxNum = Math.max(...globalEpisodes.map(e => e.episode_number));
        const nextNum = maxNum + 1;
        const title = `${nextNum}화: (제목 미정)`;

        try {
            const res = await fetch('/api/episodes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    setting_id: settingId,
                    episode_number: nextNum,
                    title: title,
                    content: " ", 
                    prompt: "Plot Outline"
                })
            });

            if (res.ok) {
                const result = await res.json();
                await loadEpisodeList(result.id);
				if (window.innerWidth <= 900) toggleSidebar();
            } else { alert("추가 실패"); }
        } catch(e) { alert("오류 발생"); }
    }

    async function saveCurrentEpisode() {
        if (!currentEpisodeId) return;
        
        const title = document.getElementById('episodeTitle').value;
        const content = document.getElementById('plotContent').value;
        // 🌟 트리트먼트 내용도 함께 저장
        const treatment = document.getElementById('treatmentContent').value;
        
        const current = globalEpisodes.find(e => e.id === currentEpisodeId);
        const epNum = current ? current.episode_number : 999;

        try {
            const res = await fetch(`/api/episodes/${currentEpisodeId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    episode_number: epNum,
                    title: title,
                    content: content,
                    treatment: treatment // 🌟 추가됨
                })
            });

            if (res.ok) {
                alert("저장되었습니다.");
                // 로컬 데이터 갱신
                const target = globalEpisodes.find(e => e.id === currentEpisodeId);
                if(target) {
                    target.title = title;
                    target.content = content;
                    target.treatment = treatment;
                }
                loadEpisodeList(currentEpisodeId); // 목록 제목 등 갱신
            } else { alert("저장 실패"); }
        } catch(e) { alert("오류 발생"); }
    }

    async function deleteCurrentEpisode() {
        if (!currentEpisodeId) return;
        if (!confirm("삭제하시겠습니까?")) return;

        try {
            const res = await fetch(`/api/episodes/${currentEpisodeId}`, { method: 'DELETE' });
            if (res.ok) {
                alert("삭제되었습니다.");
                currentEpisodeId = null;
                showEditor(false);
                loadEpisodeList();
            } else { alert("삭제 실패"); }
        } catch(e) { alert("오류 발생"); }
    }

    function copyContent(elementId) {
        const content = document.getElementById(elementId).value;
        if (!content) return alert("내용이 없습니다.");
        navigator.clipboard.writeText(content).then(() => alert("복사되었습니다."));
    }

    init();
</script>
