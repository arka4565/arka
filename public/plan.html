<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>소설 구조 설계 (Plan) </title>
	<script src="auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a90e2;
            --map-color: #3498db;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #333;
            --nav-bg: #2c3e50;
            --nav-text: #ecf0f1;
            --border-color: #e1e4e8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 네비게이션 */
        .navbar {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-logo { font-weight: bold; font-size: 1.1rem; color: white; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .nav-links { display: flex; gap: 5px; overflow-x: auto; }
        .nav-item {
            color: #bdc3c7;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-item.active { color: white; background: var(--primary-color); font-weight: bold; }

        /* 메인 컨테이너 */
        .container {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        h2 { 
            border-left: 5px solid var(--map-color); 
            padding-left: 10px; 
            margin: 0; 
            color: var(--secondary-color); 
            font-size: 1.5rem;
        }

        /* 입력 섹션 */
        .ai-input-section {
            background: #fff;
            border: 1px solid #dbe9f6;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 30px;
        }
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        
        .map-textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5;
        }
        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        .btn-generate {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.05rem;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3); }

        /* 결과 영역 헤더 */
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }
        .btn-save-roadmap {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-save-roadmap:hover { background: #219150; }

        /* Part 리스트 스타일 */
        .roadmap-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .part-card {
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fff;
            overflow: hidden;
            transition: box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .part-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.08); transform: translateY(-2px); }
        
        .part-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .part-theme {
            font-size: 0.9rem;
            color: #555;
            background-color: #fff3cd; /* 연한 노란색 강조 */
            padding: 8px 12px;
            border-radius: 6px;
            margin: 10px 20px 0 20px; /* 위치 조정 */
            border: 1px solid #ffeeba;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .part-title { font-weight: bold; color: #2c3e50; font-size: 1.1rem; }
        .part-range { font-size: 0.85rem; color: #fff; background: var(--map-color); padding: 4px 10px; border-radius: 15px; font-weight: 600; margin-left: 10px;}
        
        .part-body { padding: 20px; }
        .part-content-view {
            white-space: pre-wrap;
            line-height: 1.7;
            color: #444;
            font-size: 1rem;
        }

        /* 🌟 수정 모드 스타일 */
        .edit-mode-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #3498db;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 5px;
            font-family: inherit;
        }
        .edit-mode-textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #3498db;
            border-radius: 6px;
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
        }
        .btn-edit-part {
            background: none; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; color: #555; font-size: 0.85rem;
        }
        .btn-edit-part:hover { background: #f0f0f0; }
        .btn-confirm-edit {
            background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px;
            background: #fff;
            border-radius: 12px;
            border: 2px dashed #eee;
        }

        /* --- 모달(레이어 팝업) 스타일 --- */
        .modal-overlay {
            display: none; /* 기본적으로 숨김 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-window {
            background: white;
            width: 90%;
            max-width: 800px;
            height: 85vh; /* 화면 높이의 85% */
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
        }
        .modal-title { font-size: 1.2rem; font-weight: bold; color: #333; }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f4f6f8;
        }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: white;
        }
        .btn-secondary {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-primary {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary:hover { background: #2980b9; }

        /* 미리보기 카드 스타일 */
        .preview-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .preview-title { font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .preview-content { font-size: 0.9rem; color: #555; white-space: pre-wrap; line-height: 1.5; }
        
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .part-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .btn-edit-part { align-self: flex-end; }
        }
    </style>
</head>
<body>


<script src="include.js"></script>
<div data-include="nav.html"></div>

<div class="container">
    <div class="result-header">
        <h2><i class="fas fa-map-marked-alt"></i> 소설 구조 설계 (Part)</h2>
        <button id="btnSaveMap" class="btn-save-roadmap" onclick="saveRoadmap()">
            <i class="fas fa-save"></i> 전체 저장
        </button>
    </div>

    <div class="ai-input-section" id="initialInputSection">
        <div class="input-group">
            <label class="input-label"><i class="fas fa-robot"></i> 전체 구조 설계 요청 (AI)</label>
            <div style="font-size:0.9em; color:#666; margin-bottom:10px;">작품 전체의 핵심 줄거리를 입력하세요. (단계별 생성 시 계속 유지됩니다)</div>
            <textarea id="aiPrompt" class="map-textarea" placeholder="예: 주인공이 밑바닥부터 시작해서 황제가 되는 과정"></textarea>
        </div>
        
        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
            <label class="input-label" style="margin-bottom: 10px; color: #2c3e50;"><i class="fas fa-sliders-h"></i> 생성 설정 (이어쓰기)</label>
            
            <div style="display:flex; gap:15px; flex-wrap: wrap; align-items: flex-end;">
                <div>
                    <label style="font-size: 0.85rem; color: #666; display:block; margin-bottom:5px;">작성 분위기 (단계)</label>
                    <select id="generationPhase" class="form-input" style="width:140px;">
                        <option value="ki">1. 기 (발단)</option>
                        <option value="seung">2. 승 (전개)</option>
                        <option value="jeon">3. 전 (위기)</option>
                        <option value="gyeol">4. 결 (결말)</option>
                    </select>
                </div>

                <div>
                    <label style="font-size: 0.85rem; color: #666; display:block; margin-bottom:5px;">시작 회차</label>
                    <input type="number" id="startEpisode" class="form-input" style="width:80px; text-align:center;" value="1">
                </div>
                <div style="padding-bottom: 10px;">~</div>
                <div>
                    <label style="font-size: 0.85rem; color: #666; display:block; margin-bottom:5px;">종료 회차</label>
                    <input type="number" id="endEpisode" class="form-input" style="width:80px; text-align:center;" value="25">
                </div>
            </div>
            
            <div style="font-size: 0.8rem; color: #888; margin-top: 10px;">
                * 긴 소설(100화+)은 한 번에 <b>25화씩</b> 끊어서 [생성] 하세요. (자동으로 다음 구간이 설정됩니다)
            </div>
        </div>

        <button id="btnGenerate" class="btn-generate" onclick="generateRoadmap()" style="margin-top: 15px;">
            <i class="fas fa-bolt"></i> 해당 구간 생성 시작
        </button>
    </div>

    <div id="roadmapListArea" class="roadmap-list">
        <div class="empty-state">
            <i class="fas fa-layer-group" style="font-size:3rem; margin-bottom:15px; color:#eee;"></i><br>
            아직 생성된 기획이 없습니다.<br>
            위 입력창을 통해 구조를 설계해보세요.
        </div>
    </div>
</div>

<div id="previewModal" class="modal-overlay">
    <div class="modal-window">
        <div class="modal-header">
            <div class="modal-title"><i class="fas fa-magic"></i> AI 구조 생성 결과 미리보기</div>
            <button onclick="closePreviewModal()" style="border:none; background:none; font-size:1.2rem; cursor:pointer;">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" id="previewListArea">
        </div>
        <div class="modal-footer">
            <span style="margin-right:auto; font-size:0.9rem; color:#e74c3c;" id="previewWarningText">
                 </span>
            <button class="btn-secondary" onclick="closePreviewModal()">취소</button>
            <button class="btn-primary" onclick="applyPreview()">적용하기</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const settingId = urlParams.get('setting_id') || urlParams.get('id');

    let contextData = ""; 
    let roadmapData = []; 
    let tempRoadmapData = [];
    let currentSettings = {};

    window.onload = init;

    function movePage(page) {
        if (settingId) location.href = `${page}?setting_id=${settingId}`;
        else location.href = page;
    }

    async function init() {
        if (!settingId) {
            alert("잘못된 접근입니다. 설정 ID가 없습니다.");
            return;
        }
        await loadContextData(); 
        await loadRoadmapData(); 
        
        // 데이터 로드 후 다음 작성할 구간 자동 계산
        autoSetNextRange();
    }

    // 다음 작성 구간 자동 계산 함수
    function autoSetNextRange() {
        let nextStart = 1;
        if (roadmapData.length > 0) {
            // 마지막 데이터의 range (예: "25화" 또는 "1~25화")에서 숫자 추출
            // 보통 마지막 Part의 range는 "25화" 형식이지만, 안전하게 처리
            const lastItem = roadmapData[roadmapData.length - 1];
            // range 문자열에서 숫자를 모두 추출
            const nums = lastItem.range.match(/\d+/g); 
            if (nums && nums.length > 0) {
                // 가장 뒤에 있는 숫자를 마지막 회차로 간주
                const lastNum = parseInt(nums[nums.length - 1]);
                nextStart = lastNum + 1;
            }
        }
        document.getElementById('startEpisode').value = nextStart;
        document.getElementById('endEpisode').value = nextStart + 24; // 25화 단위 기본값
    }

    // 1. Context 로드
    async function loadContextData() {
        try {
            const [sRes, wRes, cRes, dRes] = await Promise.all([
                fetch(`/api/load-settings?id=${settingId}`).then(r => r.json()),
                fetch(`/api/worldsettings?setting_id=${settingId}`).then(r => r.json()),
                fetch(`/api/characters?setting_id=${settingId}`).then(r => r.json()),
                fetch(`/api/stories?setting_id=${settingId}`).then(r => r.json())
            ]);
            currentSettings = sRes;
            contextData = `
            [제목]: ${sRes.title}
            [세계관 요약]: ${Array.isArray(wRes) ? wRes.map(w => w.title + ": " + w.description).join('\n') : '없음'}
            [주요 등장인물]: ${Array.isArray(cRes) ? cRes.map(c => `${c.name} (${c.role}): ${c.description}`).join('\n') : '없음'}            
            `;
            // stories 내용이 너무 길 수 있으므로 생략하거나 최근 회차만 가져오는 것이 좋음
            console.log("Context Loaded");
            
        } catch (e) { console.warn("Context fail", e); }
    }

    // 2. 로드맵(Plan) 불러오기
    async function loadRoadmapData() {
        try {
            const res = await fetch(`/api/plans?setting_id=${settingId}`);
            if (res.ok) {
                const data = await res.json();
                if (Array.isArray(data)) {
                    roadmapData = data.map(item => ({
                        id: item.id,
                        part: item.part_index,
                        title: item.title,
                        theme: item.theme,
                        content: item.content,
                        range: item.episode_range
                    }));
                    renderRoadmap();
                }
            }
        } catch (e) { console.error("Load Plan Error", e); }
    }

    // 3. 🌟 AI 생성 (단계별 범위 지정 모드)
    async function generateRoadmap() {
        const prompt = document.getElementById('aiPrompt').value.trim();
        const phase = document.getElementById('generationPhase').value;
        const startEp = document.getElementById('startEpisode').value;
        const endEp = document.getElementById('endEpisode').value;
        
        if (!prompt) return alert("줄거리 요청 내용을 입력하세요.");
        if (parseInt(startEp) > parseInt(endEp)) return alert("시작 회차가 종료 회차보다 큽니다.");

        const btn = document.getElementById('btnGenerate');
        const orgText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${startEp}~${endEp}화 생성 중...`;

        try {
            // 현재까지의 줄거리 맥락 가져오기 (전체를 다 넣으면 너무 길 수 있으니 요약이 필요하지만, 여기선 전체를 넣음)
            // 토큰 최적화를 위해 최근 10개 part 정도만 넣거나, 전체를 넣되 모델 성능에 기대함.
            const currentStoryContext = roadmapData.map(item => 
                `[Part ${item.part} (${item.range})]: ${item.content}`
            ).join('\n');

            let phaseInstruction = "";
            if (phase === 'ki') phaseInstruction = "현재는 [기(발단)] 단계입니다. 세계관 소개, 인물 등장, 사건의 발단을 흥미롭게 서술하세요.";
            else if (phase === 'seung') phaseInstruction = "현재는 [승(전개)] 단계입니다. 사건이 확장되고 주인공의 시련과 성장이 본격화되는 과정을 그리세요.";
            else if (phase === 'jeon') phaseInstruction = "현재는 [전(위기/절정)] 단계입니다. 갈등이 최고조에 달하고 충격적인 반전이나 큰 사건이 터지는 구간입니다.";
            else if (phase === 'gyeol') phaseInstruction = "현재는 [결(결말)] 단계입니다. 모든 갈등을 해소하고 이야기를 마무리하세요.";

            // 시스템 프롬프트 구성
            const sysPrompt = `
            당신은 웹소설 구조 설계 전문가입니다.
            [작품 정보] ${contextData}
            
            [현재 작업 목표]: ${startEp}화부터 ${endEp}화까지 총 ${endEp - startEp + 1}개 Part를 생성하는 것.
            [단계 분위기]: ${phaseInstruction}
            
            [이전까지의 줄거리(Context)]:
            ${currentStoryContext ? currentStoryContext : "아직 생성된 내용 없음. 이 구간이 시작입니다."}

            위 [이전 줄거리]와 자연스럽게 이어지도록, **오직 ${startEp}화부터 ${endEp}화까지**의 내용만 작성하세요.
            각 Part는 1화 분량입니다.  Part 줄거리는 분량이 충분히 나오도록 **상세하게** 작성하라. 대략 **한글글자로 1000자정도** 나오게 작성하라. 이전 내용을 반복해서 쓰지 말고, 그 뒷이야기를 쓰세요.
            
            [출력 형식] JSON 배열만 출력하세요. (코드블럭 없이)
            [
              {"part": 숫자, "title": "제목", "range": "${startEp}화", "theme": "핵심테마", "content": "상세 줄거리..."},
              ...
            ]
            `;

            const fullPrompt = `
                [사용자 요청]: ${prompt}
                [생성 구간]: ${startEp}화 ~ ${endEp}화
            `;

            // 모델 변경: gemini-2.0-flash-exp 사용 권장 (성능 우수)
            const response = await fetch('/api/generate-text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-3.1-flash-lite-preview", 
                    payload: {
                        contents: [{ parts: [{ text: fullPrompt }] }],
                        systemInstruction: { parts: [{ text: sysPrompt }] }
                    }
                })
            });

            const resData = await response.json();
            const text = resData.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (text) {
                const jsonStr = text.replace(/```json|```/g, '').trim();
                tempRoadmapData = JSON.parse(jsonStr);

                // Part 번호 자동 보정 (이어쓰기 시)
                let startPartIndex = 1;
                if (roadmapData.length > 0) {
                    startPartIndex = roadmapData[roadmapData.length - 1].part + 1;
                }
                
                // AI가 Part 번호를 1부터 주는 경우를 대비해 순서대로 재할당
                tempRoadmapData.forEach((item, idx) => {
                    item.part = startPartIndex + idx;
                    // range 텍스트가 이상하면 강제 수정 가능하나 AI를 믿음
                });
                
                openPreviewModal();
            }

        } catch (e) {
            console.error(e);
            alert("생성 실패: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = orgText;
        }
    }

    // 4. 화면 렌더링
    function renderRoadmap() {
        const container = document.getElementById('roadmapListArea');
        container.innerHTML = '';

        if (roadmapData.length === 0) {
            container.innerHTML = `<div class="empty-state">아직 생성된 기획이 없습니다.</div>`;
            return;
        }

        roadmapData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'part-card';
            const themeText = item.theme || "테마 없음";

            card.innerHTML = `
                <div class="part-header">
                    <div>
                        <span class="part-title">Part ${item.part}. ${item.title}</span>
                        <span class="part-range">${item.range}</span>
                    </div>
                    <button class="btn-edit-part" onclick="enableEdit(${index})">
                        <i class="fas fa-edit"></i> 수정
                    </button>
                </div>

                <div id="view-mode-${index}">
                    <div class="part-theme"><i class="fas fa-lightbulb"></i> ${themeText}</div>
                    <div class="part-body">
                        <div class="part-content-view">${item.content}</div>
                    </div>
                </div>

                <div class="part-body" id="edit-mode-${index}" style="display:none;">
                    <label style="font-size:0.8rem; color:#666;">제목</label>
                    <input type="text" class="edit-mode-input" id="edit-title-${index}" value="${item.title}">
                    <label style="font-size:0.8rem; color:#666;">회차 범위</label>
                    <input type="text" class="edit-mode-input" id="edit-range-${index}" value="${item.range}">
                    <label style="font-size:0.8rem; color:#666;">핵심 테마</label>
                    <input type="text" class="edit-mode-input" id="edit-theme-${index}" value="${item.theme || ''}">
                    <label style="font-size:0.8rem; color:#666;">줄거리</label>
                    <textarea class="edit-mode-textarea" id="edit-content-${index}">${item.content}</textarea>
                    <div style="text-align:right; margin-top:10px;">
                        <button class="btn-confirm-edit" onclick="confirmEdit(${index})">저장</button>
                        <button class="btn-edit-part" onclick="cancelEdit(${index})">취소</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        document.getElementById('btnSaveMap').style.display = 'inline-flex';
    }

    function enableEdit(index) {
        document.getElementById(`view-mode-${index}`).style.display = 'none';
        document.getElementById(`edit-mode-${index}`).style.display = 'block';
    }
    function cancelEdit(index) {
        document.getElementById(`view-mode-${index}`).style.display = 'block';
        document.getElementById(`edit-mode-${index}`).style.display = 'none';
    }
    function confirmEdit(index) {
        roadmapData[index].title = document.getElementById(`edit-title-${index}`).value;
        roadmapData[index].range = document.getElementById(`edit-range-${index}`).value;
        roadmapData[index].theme = document.getElementById(`edit-theme-${index}`).value;
        roadmapData[index].content = document.getElementById(`edit-content-${index}`).value;
        renderRoadmap();
    }

    async function saveRoadmap(silent = false) {
        if (!settingId) return;
        const btn = document.getElementById('btnSaveMap');
        if(!silent) { btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 저장 중...`; }
        try {
            const response = await fetch('/api/plans/bulk', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ setting_id: settingId, plans: roadmapData })
            });
            if (response.ok && !silent) alert("저장되었습니다.");
            else if(!response.ok) throw new Error("저장 실패");
        } catch (e) { console.error(e); if(!silent) alert("저장 중 오류 발생"); } 
        finally { if(!silent) { btn.disabled = false; btn.innerHTML = `<i class="fas fa-save"></i> 전체 저장`; } }
    }
    
    // 모달 관련
    function openPreviewModal() {
        const listArea = document.getElementById('previewListArea');
        const warning = document.getElementById('previewWarningText');
        listArea.innerHTML = '';
        
        if(!tempRoadmapData || tempRoadmapData.length === 0) return;

        // 경고 문구 설정
        if (roadmapData.length > 0) {
            warning.innerHTML = `<i class="fas fa-info-circle"></i> 기존 내용 뒤에 <b>${tempRoadmapData.length}개 Part</b>가 추가됩니다.`;
        } else {
            warning.innerHTML = `<i class="fas fa-exclamation-triangle"></i> 새로 생성된 내용이 적용됩니다.`;
        }

        tempRoadmapData.forEach(item => {
             const div = document.createElement('div');
             div.className = 'preview-card';
             div.innerHTML = `
                <div class="preview-title">Part ${item.part}. ${item.title} (${item.range})</div>
                <div style="font-size:0.85rem; color:#d35400; margin-bottom:5px;">💡 ${item.theme}</div>
                <div class="preview-content">${item.content}</div>
             `;
             listArea.appendChild(div);
        });
        document.getElementById('previewModal').style.display = 'flex';
    }

    function closePreviewModal() {
        document.getElementById('previewModal').style.display = 'none';
    }

    // 🌟 [중요] 미리보기 적용 시 이어붙이기(Append)
    function applyPreview() {
        if (roadmapData.length === 0) {
            // 처음 생성 시
            roadmapData = JSON.parse(JSON.stringify(tempRoadmapData));
        } else {
            // 이어쓰기 시 -> 기존 배열에 추가
            roadmapData = [...roadmapData, ...JSON.parse(JSON.stringify(tempRoadmapData))];
        }
        
        renderRoadmap();
        closePreviewModal();
        
        // 적용 후, 다음 구간 입력을 위해 자동 계산 실행
        autoSetNextRange();
        
        // 자동 저장 (선택 사항)
        // saveRoadmap(true);
    }
</script>
</body>
</html>
