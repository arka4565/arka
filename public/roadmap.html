<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Novel Assistant - Roadmap Generator</title>
	<script src="auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --accent-color: #27ae60;
            --text-color: #333;
            --border-radius: 12px;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --nav-bg: #2c3e50;
            --nav-text: #ecf0f1;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 네비게이션 --- */
        .navbar {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-logo { font-weight: bold; font-size: 1.1rem; color: white; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .nav-links { display: flex; gap: 5px; overflow-x: auto; }
        .nav-item {
            color: #bdc3c7;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-item.active { color: white; background: var(--primary-color); font-weight: bold; }

        /* --- 메인 컨테이너 --- */
        .container {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }
        header h1 { margin: 0 0 10px 0; color: var(--secondary-color); }
        header p { color: #666; margin: 0; }

        /* --- Part List Styles --- */
        .section-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .section-header::before {
            content: ''; display: block; width: 6px; height: 24px;
            background-color: var(--primary-color);
            margin-right: 10px; border-radius: 3px;
        }

        .part-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .part-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 180px; 
        }
        .part-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.2);
            border-color: var(--primary-color);
        }
        .part-badge {
            display: inline-block;
            background-color: #f1f3f5;
            color: #495057;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .part-card h3 {
            font-size: 1.1rem; margin: 0 0 10px 0; color: var(--secondary-color);
            line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .part-card p.preview {
            font-size: 0.9rem; color: #868e96; margin: 0;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1;
        }

        /* --- Event Cards Styles --- */
        .event-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .event-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 15px; border-bottom: 1px solid #f1f3f5; padding-bottom: 15px; gap: 10px;
        }
        .event-title-box { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .event-title { font-size: 1.3rem; font-weight: bold; color: var(--secondary-color); }
        .event-range { 
            display: inline-block; background: var(--primary-color); color: #fff; 
            padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; width: fit-content;
        }

        .btn-action-group { display: flex; gap: 5px; }
        
        .save-btn {
            background-color: var(--accent-color); color: white; border: none; padding: 8px 16px;
            border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .save-btn:hover { background-color: #219150; }
        .save-btn.saved { background-color: #bdc3c7; cursor: default; }
        
        .edit-btn {
            background-color: white; color: #555; border: 1px solid #ddd; padding: 8px 12px;
            border-radius: 6px; cursor: pointer; font-weight: 600;
        }
        .edit-btn:hover { background-color: #f0f0f0; }

        .event-theme {
            background-color: #f8f9fa; color: #555; padding: 12px; border-radius: 8px;
            margin-bottom: 15px; font-style: italic; border-left: 4px solid #ced4da;
        }
        .event-content { font-size: 1.05rem; line-height: 1.7; color: #333; white-space: pre-wrap; }

        /* 수정 모드용 스타일 */
        .edit-input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #3498db; border-radius: 4px; font-size: 1rem; }
        .edit-textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #3498db; border-radius: 6px; font-size: 1rem; resize: vertical; line-height: 1.6; }
        .event-edit-form { display: none; margin-top: 10px; }
        .event-edit-form.active { display: block; }

        /* Utilities */
        .hidden { display: none !important; }
        #loading { text-align: center; margin: 50px 0; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-outline { background: transparent; border: 1px solid #868e96; color: #868e96; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-outline:hover { background: #f1f3f5; }
        
        .ai-generate-bar {
            background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #bbdefb;
        }
    </style>
</head>
<body>


<script src="include.js"></script>
<div data-include="nav.html"></div>
<div class="container">
    <header>
        <h1>📅 사건 기획 (Roadmap Builder)</h1>
        <p>Part를 선택하여 상세 사건을 기획하거나, 이미 저장된 내용을 수정하세요.</p>
    </header>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">데이터를 불러오는 중...</p>
    </div>

    <div id="part-selection-area">
        <div class="section-header">작업할 Part 선택 (Plan List)</div>
        <div id="part-list" class="part-grid"></div>
        <div id="empty-msg" style="text-align: center; color: #999; display: none; padding: 30px;">
            <p>⚠️ 저장된 기획(Plan)이 없습니다. [기획] 페이지에서 먼저 구조를 설계해주세요.</p>
        </div>
    </div>

    <div id="roadmap-result-area" class="hidden">
        <div class="top-controls">
            <div class="section-header">상세 사건 리스트 (Event List)</div>
            <button class="btn-outline" onclick="resetSelection()">🔄 Part 목록으로</button>
        </div>

        <div id="current-part-display" style="background:#f1f3f5; padding:20px; border-radius:12px; margin-bottom:25px; border-left:5px solid var(--primary-color);">
            <h3 id="cp-title" style="margin:0 0 10px 0; color:#2c3e50;">Part Title</h3>
            <div style="margin-bottom:10px;">
                <span id="cp-range" style="background:#2c3e50; color:#fff; padding:4px 10px; border-radius:15px; font-size:0.85rem;">Range</span>
                <span id="cp-theme" style="margin-left:10px; font-weight:bold; color:#d35400;"></span>
            </div>
            <p id="cp-content" style="margin:0; color:#495057; line-height:1.6; white-space: pre-wrap;">Content...</p>
        </div>

        <div class="ai-generate-bar">
            <span><i class="fas fa-magic"></i> 선택한 Part 내용을 바탕으로 사건을 생성할까요?</span>
            <button class="save-btn" style="background:#4a90e2;" onclick="callAiGeneration()">
                AI 생성 요청
            </button>
        </div>

        <div id="roadmap-container"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const settingId = urlParams.get('setting_id') || urlParams.get('id');
    
    let currentSettings = {}; 
    let parsedParts = []; // Plan 테이블에서 불러온 데이터 리스트
    let currentPart = null; // 사용자가 선택한 특정 Plan 객체
    let contextData = ""; 

    function movePage(page) {
        if (settingId) location.href = `${page}?setting_id=${settingId}`;
        else location.href = page;
    }

    window.onload = async function() {
        if (!settingId) { alert("잘못된 접근입니다."); return; }
        
        document.getElementById('part-selection-area').classList.remove('hidden');
        document.getElementById('roadmap-result-area').classList.add('hidden');

        try {
            await loadContextData(); 
            await loadPlansData(settingId);
        } catch (error) { console.error(error); }
    };

    async function loadContextData() {
        try {
            const [sRes, wRes, cRes] = await Promise.all([
                fetch(`/api/load-settings?id=${settingId}`).then(r => r.json()),
                fetch(`/api/worldsettings?setting_id=${settingId}`).then(r => r.json()),
                fetch(`/api/characters?setting_id=${settingId}`).then(r => r.json())
            ]);
            currentSettings = sRes; 
            contextData = `
                [작품 제목]: ${sRes.title || '미정'}
                [세계관 요약]: ${Array.isArray(wRes) ? wRes.map(w => w.title + ": " + w.description).join('\n') : '없음'}
                [주요 등장인물]: ${Array.isArray(cRes) ? cRes.map(c => `${c.name} (${c.role}): ${c.description}`).join('\n') : '없음'}
            `;
        } catch (e) { console.warn("Context load failed", e); }
    }

    async function loadPlansData(id) {
        showLoading("기획(Plan) 목록 불러오는 중...");
        try {
            const response = await fetch(`/api/plans?setting_id=${id}`);
            if (!response.ok) throw new Error("Plan 데이터 로드 실패");
            
            const plans = await response.json();
            
            if (Array.isArray(plans) && plans.length > 0) {
                parsedParts = plans.map(p => ({
                    partIndex: p.part_index,
                    title: p.title,
                    content: p.content,
                    range: p.episode_range,
                    theme: p.theme
                }));
                renderPartList(parsedParts);
            } else {
                document.getElementById('empty-msg').style.display = 'block';
            }
        } catch (error) {
            console.error(error);
            document.getElementById('empty-msg').innerText = "데이터 로드 실패: " + error.message;
            document.getElementById('empty-msg').style.display = 'block';
        } finally { hideLoading(); }
    }

    function renderPartList(parts) {
        const listContainer = document.getElementById('part-list');
        listContainer.innerHTML = '';

        parts.forEach((part, index) => {
            const card = document.createElement('div');
            card.className = 'part-card';
            card.onclick = () => selectPart(index);
            card.innerHTML = `
                <div>
                    <span class="part-badge">Part ${part.partIndex}</span>
                    <h3>${part.title}</h3>
                    <p class="preview">${part.content}</p>
                    <small style="color:#666; display:block; margin-top:5px;">📅 ${part.range}</small>
                </div>
                <div style="text-align: right; margin-top: 10px; font-weight: bold; color: var(--primary-color);">
                    상세 사건 기획 &rarr;
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    async function selectPart(index) {
        currentPart = parsedParts[index];
        
        // 1. 화면 전환
        document.getElementById('part-selection-area').classList.add('hidden');
        document.getElementById('roadmap-result-area').classList.remove('hidden');
        
        // 🌟 [추가] 선택된 Part 정보 렌더링
        document.getElementById('cp-title').innerText = `Part ${currentPart.partIndex}. ${currentPart.title}`;
        document.getElementById('cp-range').innerText = currentPart.range;
        document.getElementById('cp-theme').innerText = currentPart.theme ? `💡 ${currentPart.theme}` : '';
        document.getElementById('cp-content').innerText = currentPart.content;

        // 2. 컨테이너 초기화
        const container = document.getElementById('roadmap-container');
        container.innerHTML = '';

        // 3. 해당 Part의 상세 사건 조회
        showLoading(`'${currentPart.title}' 상세 사건 조회 중...`);
        
        try {
            const response = await fetch(`/api/roadmap?setting_id=${settingId}&part_index=${currentPart.partIndex}`);
            if (!response.ok) throw new Error("데이터 조회 실패");
            
            const events = await response.json();
            
            if (events && events.length > 0) {
                renderEvents(events);
            } else {
                container.innerHTML = 
                    `<div style="text-align:center; padding:40px; color:#666; background:#f9f9f9; border-radius:8px;">
                        <i class="fas fa-file-invoice" style="font-size:2rem; margin-bottom:10px;"></i><br>
                        이 Part에 저장된 상세 사건이 없습니다.<br>
                        위 <b>'AI 생성 요청'</b> 버튼을 눌러 사건을 기획해보세요.
                    </div>`;
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div style="text-align:center; padding:20px; color:red;">오류: ${e.message}</div>`;
        } finally {
            hideLoading();
        }
    }

    async function callAiGeneration() {
        if (!currentPart) return alert("선택된 Part가 없습니다.");
        
        const btn = document.querySelector('.ai-generate-bar button');
        const orgText = btn.innerText;
        btn.disabled = true; 
        btn.innerText = "⏳ 생성 중...";
        
        try {
            let prevPartContext = "이전 Part 정보 없음 (이야기의 시작)";
            let nextPartContext = "다음 Part 정보 없음 (이야기의 결말)";
            
            const currentIndex = parsedParts.findIndex(p => p.partIndex === currentPart.partIndex);
            
            if (currentPart.partIndex > 1) {
                const prevIndex = currentPart.partIndex - 1;
                const res = await fetch(`/api/roadmap?setting_id=${settingId}&part_index=${prevIndex}`);
                if (res.ok) {
                    const prevEvents = await res.json();
                    if (prevEvents && prevEvents.length > 0) {
                        prevEvents.sort((a, b) => b.event_order - a.event_order);
                        const last3Events = prevEvents.slice(0, 3).sort((a, b) => a.event_order - b.event_order);
                        const eventTexts = last3Events.map(e => `- ${e.content}`).join('\n');
                        prevPartContext = `[이전 챕터 마지막 사건들]\n${eventTexts}\n※ 연결: 위 사건의 결과/감정이 현재 챕터 도입부로 이어져야 함.`;
                    }
                }
            }
               
            if (currentIndex < parsedParts.length - 1) {
                const nextPart = parsedParts[currentIndex + 1];
                let nextContent = `- ${nextPart.content}`;
                if (parsedParts[currentIndex + 2]) {
                    nextContent += `\n- ${parsedParts[currentIndex + 2].content}`;
                }
                nextPartContext = `[다음 챕터 예고]\n${nextContent}\n※ 지침: 이 Part의 후반부는 위 '다음 챕터' 사건의 계기가 되거나 분위기를 조성해야 함.`;
            }
            
            const systemPrompt = `
                ### [Role]
                당신은 소설의 챕터(Part)를 분석하여 구체적인 '사건(Event)' 리스트로 기획하는 스토리보드 작가입니다.

                ### [작품 정보]
                ${contextData}

                ### [규칙]
                1. Part 범위(${currentPart.range})를 처음부터 끝까지 채우는 사건들을 만드세요.
                2. 각 사건은 **1화 분량**으로 배분하세요.
                3. 마지막 사건은 Part의 끝 회차와 일치해야 합니다.
				4. [다음 챕터 예고]에 있는 줄거리 내용은 포함되면 안됩니다.
				5. [다음 챕터 예고]의 이전에 있을 내용으로 작성해야 합니다.

                ### [출력 형식 (JSON Only)]
                반드시 아래 JSON 배열 포맷으로만 응답하세요. 마크다운 없이 순수 JSON만 출력하세요.
                [
                  {
                    "title": "사건 제목",
                    "range": "X화~Y화",
                    "theme": "핵심 감정/키워드",
                    "content": "상세 줄거리 (200자 이상)"
                  }
                ]
            `;

            const userPrompt = `
                다음 [현재 Part 정보]를 바탕으로 상세 사건 리스트를 작성해줘.

                [현재 Part 정보]
                - 제목: ${currentPart.title}
                - 회차 범위: ${currentPart.range}
                - 줄거리: ${currentPart.content}
                
                [Context Flow]
                1. ${prevPartContext}
                2. ${nextPartContext}
                
                위 흐름을 고려하여 자연스럽게 연결되는 사건들을 기획해줘.
            `;

            const response = await fetch('/api/generate-text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-3.1-flash-lite-preview", 
                    payload: {
                        contents: [{ parts: [{ text: userPrompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    }
                })
            });

            if (!response.ok) throw new Error("AI 호출 실패");
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if(text) parseAndRenderAiResult(text);

        } catch(e) { 
            alert("AI 생성 실패: " + e.message); 
            console.error(e);
        } finally { 
            btn.disabled = false; 
            btn.innerText = orgText; 
        }
    }

    function parseAndRenderAiResult(text) {
        const container = document.getElementById('roadmap-container');
        container.innerHTML = ''; 

        try {
            let cleanJson = text.replace(/```json|```/g, '').trim();
            const eventsData = JSON.parse(cleanJson);

            if (!Array.isArray(eventsData)) throw new Error("JSON 형식이 배열이 아닙니다.");

            const events = eventsData.map((item, index) => {
                return {
                    event_order: index + 1,
                    title: item.title || "제목 없음",
                    episode_range: item.range || "미정",
                    theme: item.theme || "",
                    content: item.content || ""
                };
            });

            renderEvents(events);

        } catch (e) {
            console.error("Parsing Error:", e, text);
            alert("데이터 파싱 중 오류가 발생했습니다.");
            container.innerHTML = `<div class="event-card"><div class="event-content" style="color:red;">파싱 실패. 원본 데이터:<br>${text}</div></div>`;
        }
    }

    function renderEvents(events) {
        const container = document.getElementById('roadmap-container');
        container.innerHTML = '';

        events.forEach((evt, idx) => {
            const card = document.createElement('div');
            card.className = 'event-card';
            const uniqueId = `evt-${Date.now()}-${idx}`;
            
            const viewHtml = `
                <div id="view-${uniqueId}">
                    <div class="event-header">
                        <div class="event-title-box">
                            <span class="event-title">#${evt.event_order}. ${evt.title}</span>
                            ${evt.episode_range ? `<span class="event-range">${evt.episode_range}</span>` : ''}
                        </div>
                        <div class="btn-action-group">
                            <button class="edit-btn" onclick="toggleEdit('${uniqueId}')"><i class="fas fa-edit"></i> 수정</button>
                            <button class="save-btn ${evt.id ? 'saved' : ''}" onclick='saveToDB(this, ${JSON.stringify(evt).replace(/'/g, "&#39;")})'>
                                ${evt.id ? '✅ 저장됨' : '💾 저장'}
                            </button>
                        </div>
                    </div>
                    ${evt.theme ? `<div class="event-theme">💡 ${evt.theme}</div>` : ''}
                    <div class="event-content">${evt.content}</div>
                </div>
            `;

            const editHtml = `
                <div id="edit-${uniqueId}" class="event-edit-form">
                    <label>제목</label>
                    <input type="text" id="input-title-${uniqueId}" class="edit-input" value="${evt.title}">
                    <label>회차 범위 (예: 1~3화)</label>
                    <input type="text" id="input-range-${uniqueId}" class="edit-input" value="${evt.episode_range || ''}">
                    <label>핵심 테마</label>
                    <input type="text" id="input-theme-${uniqueId}" class="edit-input" value="${evt.theme || ''}">
                    <label>줄거리</label>
                    <textarea id="input-content-${uniqueId}" class="edit-textarea">${evt.content}</textarea>
                    
                    <div style="text-align:right; margin-top:10px;">
                        <button class="save-btn" style="display:inline-flex;" onclick="confirmEdit('${uniqueId}', ${evt.event_order})">확인</button>
                        <button class="edit-btn" onclick="toggleEdit('${uniqueId}')">취소</button>
                    </div>
                </div>
            `;

            card.innerHTML = viewHtml + editHtml;
            container.appendChild(card);
        });
    }

    function toggleEdit(uid) {
        const viewDiv = document.getElementById(`view-${uid}`);
        const editDiv = document.getElementById(`edit-${uid}`);
        
        if (editDiv.style.display === 'block') {
            editDiv.style.display = 'none';
            viewDiv.style.display = 'block';
        } else {
            editDiv.style.display = 'block';
            viewDiv.style.display = 'none';
        }
    }

    function confirmEdit(uid, order) {
        const title = document.getElementById(`input-title-${uid}`).value;
        const range = document.getElementById(`input-range-${uid}`).value;
        const theme = document.getElementById(`input-theme-${uid}`).value;
        const content = document.getElementById(`input-content-${uid}`).value;

        const viewDiv = document.getElementById(`view-${uid}`);
        viewDiv.querySelector('.event-title').innerText = `#${order}. ${title}`;
        
        let rangeSpan = viewDiv.querySelector('.event-range');
        if(!rangeSpan) {
            rangeSpan = document.createElement('span');
            rangeSpan.className = 'event-range';
            viewDiv.querySelector('.event-title-box').appendChild(rangeSpan);
        }
        rangeSpan.innerText = range;

        let themeDiv = viewDiv.querySelector('.event-theme');
        if(!themeDiv && theme) {
            themeDiv = document.createElement('div');
            themeDiv.className = 'event-theme';
            viewDiv.insertBefore(themeDiv, viewDiv.querySelector('.event-content'));
        }
        if(themeDiv) themeDiv.innerText = `💡 ${theme}`;
        
        viewDiv.querySelector('.event-content').innerText = content;

        const saveBtn = viewDiv.querySelector('.save-btn');
        saveBtn.innerText = "💾 저장 (수정됨)";
        saveBtn.classList.remove('saved');
        
        const newData = {
            setting_id: settingId,
            part_index: currentPart.partIndex,
            event_order: order,
            title: title,
            episode_range: range,
            theme: theme,
            content: content
        };
        
        saveBtn.onclick = () => saveToDB(saveBtn, newData);
        toggleEdit(uid);
    }

    async function saveToDB(btnElement, data) {
        if (!confirm(`'${data.title}' 내용을 저장하시겠습니까?`)) return;

        data.setting_id = settingId;
        data.part_index = currentPart.partIndex;

        const originalText = btnElement.innerText;
        btnElement.disabled = true;
        btnElement.innerText = "⏳ 저장 중...";

        try {
            const response = await fetch('/api/roadmap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                btnElement.innerText = "✅ 저장됨";
                btnElement.classList.add('saved');
                btnElement.disabled = false; 
            } else {
                const err = await response.json();
                alert("저장 실패: " + err.error);
                btnElement.disabled = false;
                btnElement.innerText = originalText;
            }
        } catch (error) {
            console.error(error);
            alert("오류 발생");
            btnElement.disabled = false;
            btnElement.innerText = originalText;
        }
    }

    function resetSelection() {
        document.getElementById('part-selection-area').classList.remove('hidden');
        document.getElementById('roadmap-result-area').classList.add('hidden');
        document.getElementById('roadmap-container').innerHTML = '';
        currentPart = null;
    }

    function showLoading(msg) {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('loading-text').innerText = msg;
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
