<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세계관 </title>
	<script src="auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --sub-text: #666;
            --nav-bg: #2c3e50;
            --nav-text: #ecf0f1;
            --danger-color: #ff4d4f;
            --ai-color: #2e7d32;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }
		/* 🌟 기존 CSS 아래에 추가 */
        .btn-keyword-gen {
            background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9;
            padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
            margin-top: 5px;
        }
        .btn-keyword-gen:hover { background: #c8e6c9; }
        .btn-keyword-gen:disabled { color: #999; border-color: #ddd; background: #f5f5f5; cursor: wait; }
        /* 네비게이션 */
        .navbar {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-logo { font-weight: bold; font-size: 1.1rem; color: white; text-decoration: none; }
        .nav-links { display: flex; gap: 5px; overflow-x: auto; }
        .nav-item {
            color: #bdc3c7; text-decoration: none; padding: 8px 12px; border-radius: 4px; font-size: 0.9rem; white-space: nowrap; transition: all 0.2s;
        }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-item.active { color: white; background: var(--primary-color); font-weight: bold; }

        /* 컨테이너 */
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }

        /* AI 섹션 */
        .ai-section {
            background: white; border: 1px solid #c8e6c9; border-radius: 12px; padding: 20px;
            margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .ai-header { font-size: 1.1rem; font-weight: bold; color: var(--ai-color); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .ai-desc { font-size: 0.9rem; color: #666; margin-bottom: 15px; }
        .ai-textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            min-height: 80px; resize: vertical; font-family: inherit; margin-bottom: 10px;
        }
        .ai-textarea:focus { outline: 2px solid var(--ai-color); border-color: transparent; }
        
        .btn-ai-gen {
            width: 100%; background-color: var(--ai-color); color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: background 0.2s;
        }
        .btn-ai-gen:hover { background-color: #1b5e20; }
        .btn-ai-gen:disabled { background-color: #a5d6a7; cursor: not-allowed; }

        /* 헤더 및 버튼 */
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-area h2 { margin: 0; border-left: 5px solid var(--primary-color); padding-left: 10px; }
        .btn-add {
            background-color: var(--primary-color); color: white; border: none; padding: 10px 18px;
            border-radius: 25px; font-size: 0.95rem; cursor: pointer; box-shadow: 0 4px 6px rgba(74, 144, 226, 0.3);
        }

        /* 카드 그리드 */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .world-card {
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee;
            min-height: 180px; display: flex; flex-direction: column; transition: transform 0.2s;
        }
        .world-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; color: #2c3e50; }
        .card-desc { 
            font-size: 0.9rem; color: #555; line-height: 1.5; flex-grow: 1; 
            white-space: pre-wrap; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical;
        }
        /* 🌟 키워드 태그 스타일 추가 */
        .card-keywords { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        .keyword-tag { 
            background: #eef2f7; color: #4a90e2; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold;
        }

        .card-actions { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; color: #999; }
        .action-btn:hover { color: var(--primary-color); }
        .action-btn.delete:hover { color: var(--danger-color); }

        /* 공통 모달 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .form-input, .form-textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .form-textarea { min-height: 120px; resize: vertical; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #eee; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-submit { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }

        /* 🌟 AI 미리보기 목록 스타일 (선택형) */
        .preview-list { display: flex; flex-direction: column; gap: 15px; margin: 15px 0; }
        .preview-item {
            border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fafafa;
            display: flex; gap: 15px; align-items: flex-start;
        }
        .preview-check { margin-top: 5px; transform: scale(1.3); cursor: pointer; }
        .preview-content { flex: 1; }
        .preview-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; color: #2e7d32; }
        .preview-desc { font-size: 0.95rem; color: #444; line-height: 1.6; white-space: pre-wrap; }
        .preview-keywords { margin-top: 8px; color: #4a90e2; font-size: 0.85rem; font-weight: bold; }

        @media (max-width: 600px) {
            .navbar { flex-direction: column; align-items: stretch; gap: 10px; }
            .container { padding: 15px; margin: 10px auto; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>

<div class="container">
    
    <div class="ai-section">
        <div class="ai-header">
            <i class="fas fa-robot"></i> AI 기반 세계관 구성
        </div>
        <div class="ai-desc">
            선택된 플롯(회차)의 흐름을 분석하여 세계관을 생성합니다.<br>
            <small class="text-gray-500">(특정 회차 범위의 사건을 기반으로 설정을 짭니다.)</small>
        </div>
        
        <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
            <label style="font-weight:bold; color:#555; font-size:0.9rem;">참고 범위:</label>
            <input type="number" id="startEp" class="form-input" style="width:80px; padding:8px;" placeholder="1" value="1">
            <span style="font-weight:bold;">~</span>
            <input type="number" id="endEp" class="form-input" style="width:80px; padding:8px;" placeholder="50">
            <span style="font-size:0.8rem; color:#888;">화 (비워두면 전체)</span>
        </div>

        <textarea id="aiPrompt" class="ai-textarea" placeholder="아래 '🎲 예시 문구' 버튼을 눌러 추천받거나 직접 입력하세요."></textarea>
        
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button type="button" onclick="setRandomPrompt()" style="background:#fff; border:1px solid #ddd; padding:10px 15px; border-radius:8px; cursor:pointer; color:#555; font-weight:bold; white-space:nowrap;">
                🎲 예시 문구
            </button>
            <button id="btnAiGen" class="btn-ai-gen" onclick="generateAiWorldSettings()" style="flex:1; margin-top:0;">
                <i class="fas fa-magic"></i> AI로 세계관 구성하기
            </button>
        </div>
    </div>

    <div class="header-area">
        <h2>세계관 설정 목록</h2>
        <button class="btn-add" onclick="openModal('add')"><i class="fas fa-plus"></i> 항목 추가</button>
    </div>

    <div id="worldGrid" class="grid-container">
        <div style="grid-column: 1/-1; text-align:center; padding: 40px; color: #999;">
            <i class="fas fa-spinner fa-spin"></i> 로딩 중...
        </div>
    </div>
</div>

<div id="worldModal" class="modal-overlay">
    <div class="modal">
        <h3 id="modalTitle">세계관 추가</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label class="form-label">제목 (핵심 키워드)</label>
            <p style="font-size:0.8rem; color:#666; margin-bottom:5px;">
                * 팁: 집필 시 이 제목을 <b>#제목</b> 형태로 쓰면 AI가 설정을 인식합니다.<br>
                (예: '마법' 이라고 저장하고, 본문 지시문에 '#마법' 작성)
            </p>
            <input type="text" id="inputTitle" class="form-input" placeholder="예: 마나 시스템">
        </div>
        
        <div class="form-group">
            <label class="form-label">관련 키워드 (선택)</label>
            <input type="text" id="inputKeywords" class="form-input" placeholder="예: #마법 #판타지 (쉼표나 공백으로 구분)">
        </div>

        <div class="form-group">
            <label class="form-label">상세 내용</label>
            <textarea id="inputDesc" class="form-textarea" placeholder="설명을 적어주세요."></textarea>
        </div>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal('worldModal')">취소</button>
            <button class="btn-submit" onclick="saveWorldSetting()">저장</button>
        </div>
    </div>
</div>

<div id="aiPreviewModal" class="modal-overlay">
    <div class="modal" style="max-width: 700px;">
        <h3><i class="fas fa-check-double"></i> 생성된 설정 확인</h3>
        <p style="font-size:0.9rem; color:#666; margin-bottom:10px;">
            저장할 항목을 선택해주세요. (각각 별도의 카드로 저장됩니다.)
        </p>
        
        <div id="aiResultList" class="preview-list">
            </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal('aiPreviewModal')">취소</button>
            <button class="btn-submit" onclick="saveBulkWorldSettings()">선택 항목 저장</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const settingId = urlParams.get('setting_id');
    
    let worldList = []; 
    let aiGeneratedData = []; // AI 결과 저장용

    const worldPrompts = [
        "이 소설의 분위기에 맞는 독창적인 지리적 특성과 기후, 주요 산업 3가지를 설정해줘.",
        "이 세계의 신분 제도와 사회적 계급 구조, 그리고 계급 간의 갈등 요소를 만들어줘.",
        "능력에 따른 '대가'나 '패널티'가 존재하는 독특한 능력을 구체적으로 만들어줘.",
        "게이트가 발생한 이후 바뀐 현대 사회의 법률과 헌터들의 등급 체계를 설정해줘.",
    ];

    function init() {
        if (!settingId) {
            alert("프로젝트 ID가 없습니다.");
            window.location.href = 'index.html';
            return;
        }
        setupNav();
        loadWorldSettings();
    }

    function setupNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            const target = item.dataset.target;
            if (target) item.href = `${target}?setting_id=${settingId}`;
        });
    }

    function setRandomPrompt() {
        const randomIndex = Math.floor(Math.random() * worldPrompts.length);
        document.getElementById('aiPrompt').value = worldPrompts[randomIndex];
    }

    // --- 기본 CRUD ---
    async function loadWorldSettings() {
        const grid = document.getElementById('worldGrid');
        try {
            const res = await fetch(`/api/worldsettings?setting_id=${settingId}`);
            worldList = await res.json();
            
            grid.innerHTML = '';
            if (worldList.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:#aaa;">등록된 설정이 없습니다.</div>`;
                return;
            }

            worldList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'world-card';
                // 클릭 시 수정 모달 열기 (버튼 클릭 제외)
                card.onclick = (e) => { 
                    if(!e.target.closest('button')) openModal('edit', item.id); 
                };

                // 키워드 HTML 생성
                let keywordsHtml = '';
                if(item.keywords && item.keywords.trim() !== '') {
                    keywordsHtml = item.keywords.split(',').map(k => `<span class="keyword-tag">${k.trim()}</span>`).join('');
                } else {
                    // 🌟 키워드가 없으면 '자동 생성 버튼' 표시
                    keywordsHtml = `
                        <button class="btn-keyword-gen" onclick="autoGenerateKeywords(event, ${item.id})">
                            <i class="fas fa-magic"></i> 키워드 자동 추출
                        </button>
                    `;
                }

                card.innerHTML = `
                    <div class="card-title">${item.title}</div>
                    <div class="card-desc">${item.description || ''}</div>
                    <div class="card-keywords">${keywordsHtml}</div>
                    <div class="card-actions">
                        <button class="action-btn delete" onclick="deleteWorldSetting(event, ${item.id})"><i class="fas fa-trash"></i> 삭제</button>
                    </div>
                `;
                grid.appendChild(card);
            });
			
        } catch (e) { console.error(e); }
    }
	
	// 🌟 [추가] 기존 설정으로 키워드 자동 생성 및 저장
    async function autoGenerateKeywords(e, id) {
        e.stopPropagation(); // 카드 클릭 이벤트 방지

        // 현재 항목 데이터 찾기
        const item = worldList.find(w => w.id === id);
        if (!item) return;

        const btn = e.target.closest('button');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 분석 중...';

        const prompt = `
            [역할] 웹소설 보조 작가
            [작업] 아래 세계관 설정을 분석하여, 검색 및 분류에 용이한 **핵심 키워드 3~5개**를 해시태그 형식으로 추출하세요.
            
            [설정 제목] ${item.title}
            [상세 내용] ${item.description}

            [조건]
            1. 결과는 오직 키워드만 쉼표(,)로 구분하여 출력하세요.
            2. 설명이나 잡담은 제외하세요.
            3. 예시: "#마법, #마나, #서클, #판타지"
        `;

        try {
            // 1. AI에게 키워드 요청
            const aiRes = await fetch('/api/generate-text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-3.1-flash-lite-preview",
                    payload: { contents: [{ parts: [{ text: prompt }] }] }
                })
            });
            const aiData = await aiRes.json();
            const keywords = aiData.candidates[0].content.parts[0].text.trim();

            // 2. DB에 업데이트 (PUT)
            const updateRes = await fetch(`/api/worldsettings/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    setting_id: settingId,
                    title: item.title,
                    description: item.description,
                    keywords: keywords // 생성된 키워드 저장
                })
            });

            if (updateRes.ok) {
                // 3. UI 새로고침
                await loadWorldSettings();
            } else {
                alert("저장 실패");
            }

        } catch (error) {
            console.error(error);
            alert("키워드 생성 중 오류가 발생했습니다.");
        } finally {
            if(btn) {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    }
	
    // --- 🌟 AI 생성 로직 (강력한 파싱 적용) ---
    async function generateAiWorldSettings() {
        const prompt = document.getElementById('aiPrompt').value.trim();
        const startEpInput = document.getElementById('startEp').value;
        const endEpInput = document.getElementById('endEp').value;
        
        if (!prompt) return alert("요청 내용을 입력해주세요.");

        const btn = document.getElementById('btnAiGen');
        const originalBtnText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 생성 중...';

        try {
            // 1. 데이터 로드
            const [sRes, eRes] = await Promise.all([
                fetch(`/api/load-settings?id=${settingId}`),
                fetch(`/api/episodes?setting_id=${settingId}`)
            ]);

            const settings = await sRes.json();
            const allEpisodes = await eRes.json();
            const existTitles = worldList.map(w => w.title).join(', ');

            const startEp = startEpInput ? parseInt(startEpInput) : 1;
            const endEp = endEpInput ? parseInt(endEpInput) : 9999;
            const targetEpisodes = allEpisodes.filter(ep => 
                ep.episode_number >= startEp && ep.episode_number <= endEp
            );

            let episodeSummary = "";
            if (targetEpisodes.length > 0) {
                episodeSummary = targetEpisodes.map(ep => {
                    const contentSnippet = ep.content ? ep.content.substring(0, 300).replace(/\n/g, ' ') : "내용 없음";
                    return `- [${ep.episode_number}화: ${ep.title}] ${contentSnippet}...`;
                }).join('\n');
            } else {
                episodeSummary = "선택된 범위에 작성된 회차가 없습니다. (전체 설정 참조)";
            }

            // 프롬프트 구성
            const fullPrompt = `
                [역할] 웹소설 세계관 설정 작가
                [작품 제목] ${settings.title}
                [현재 진행된 이야기 흐름 (${startEp}화 ~ ${endEp}화)]
                ${episodeSummary}
                
                [이미 존재하는 세계관 설정] ${existTitles}
                
                [요청 사항]
                ${prompt}

                [출력 조건]
                1. 위 요청에 맞춰 세계관 설정을 **3가지에서 5가지** 생성하세요.
                2. 각 항목은 제목(Title), 상세 내용(Description), **관련 키워드(Keywords)**를 가져야 합니다.
                3. **키워드**는 해당 설정을 대표하는 단어들을 쉼표로 구분하여 문자열로 작성하세요. (예: "#마법, #마나, #서클")
                4. 반드시 아래와 같은 **JSON 배열 형식(Array)**으로만 출력하세요. 
                5. **중요: description 안에는 줄바꿈(\\n)과 글머리 기호(-, *)를 사용하여 가독성 있게 작성하세요.**

                [JSON 예시]
                [
                    { 
                        "title": "마나 시스템", 
                        "description": "- 1서클부터 9서클까지 존재\\n- 9서클은 신의 영역이다.",
                        "keywords": "#마법, #마나, #서클"
                    }
                ]
            `;
            
            console.log("AI 요청 시작..."); // 디버깅용

            const aiRes = await fetch('/api/generate-text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemini-3.1-flash-lite-preview",
                    payload: { contents: [{ parts: [{ text: fullPrompt }] }] }
                })
            });
            const aiData = await aiRes.json();
            
            let text = aiData.candidates[0].content.parts[0].text;
            console.log("AI 원본 응답:", text); // 디버깅용: 콘솔에서 확인 가능

            // 🌟 [핵심 수정] JSON 추출 로직 강화
            // 1. 마크다운 코드블록 제거
            text = text.replace(/```json/g, '').replace(/```/g, '');
            
            // 2. 대괄호 [ ... ] 사이의 내용만 강제로 추출 (앞뒤 사족 제거)
            const jsonMatch = text.match(/\[[\s\S]*\]/);
            
            if (!jsonMatch) {
                throw new Error("AI 응답에서 JSON 데이터를 찾을 수 없습니다.");
            }

            // 추출된 JSON 문자열만 파싱
            aiGeneratedData = JSON.parse(jsonMatch[0]);
			
            if (!Array.isArray(aiGeneratedData) || aiGeneratedData.length === 0) {
                throw new Error("데이터가 비어있거나 올바른 형식이 아닙니다.");
            }

            // 3. 모달 열기
            openAiPreviewModal();

        } catch (e) {
            console.error(e);
            alert("생성 실패: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalBtnText;
        }
    }

    // 미리보기 모달 (키워드 포함)
    function openAiPreviewModal() {
        const listContainer = document.getElementById('aiResultList');
        listContainer.innerHTML = '';
		
        aiGeneratedData.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'preview-item';
			// 데이터가 없을 경우를 대비해 안전장치(|| '') 추가
            const safeTitle = item.title || "제목 없음";
            const safeDesc = item.description || "내용 없음";
            const safeKeywords = item.keywords || "";
            div.innerHTML = `
                <input type="checkbox" class="preview-check" id="world_chk_${idx}" checked>
                <div class="preview-content">
                    <div class="preview-title">${safeTitle}</div>
                    <div class="preview-desc">${safeDesc}</div>
                    <div class="preview-keywords">${safeKeywords}</div>
                </div>
            `;
            listContainer.appendChild(div);
        });

        document.getElementById('aiPreviewModal').style.display = 'flex';
    }

    // 선택 항목 대량 저장 (키워드 포함)
    async function saveBulkWorldSettings() {
        const selectedItems = [];
        aiGeneratedData.forEach((item, idx) => {
            const chk = document.getElementById(`world_chk_${idx}`);
            if (chk && chk.checked) selectedItems.push(item);
        });

        if (selectedItems.length === 0) return alert("선택된 항목이 없습니다.");

        try {
            const promises = selectedItems.map(item => {
                return fetch('/api/worldsettings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        setting_id: settingId,
                        title: item.title,
                        description: item.description,
                        keywords: item.keywords || '' // 키워드 전송
                    })
                });
            });

            await Promise.all(promises);

            alert(`${selectedItems.length}개의 설정이 저장되었습니다.`);
            closeModal('aiPreviewModal');
            loadWorldSettings();
            document.getElementById('aiPrompt').value = '';

        } catch (e) {
            console.error(e);
            alert("저장 중 오류 발생");
        }
    }

    // --- 수동 모달 관련 ---
    function openModal(mode, id = null) {
        const modal = document.getElementById('worldModal');
        document.getElementById('editId').value = id || '';
        document.getElementById('inputTitle').value = '';
        document.getElementById('inputDesc').value = '';
        document.getElementById('inputKeywords').value = ''; // 초기화

        if (mode === 'edit') {
            const item = worldList.find(w => w.id === id);
            if (item) {
                document.getElementById('inputTitle').value = item.title;
                document.getElementById('inputDesc').value = item.description;
                document.getElementById('inputKeywords').value = item.keywords || ''; // 값 할당
            }
        }
        modal.style.display = 'flex';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    async function saveWorldSetting() {
        const id = document.getElementById('editId').value;
        const title = document.getElementById('inputTitle').value;
        const keywords = document.getElementById('inputKeywords').value; // 키워드 가져오기

        if(!title) return alert("제목 필수");

        const url = id ? `/api/worldsettings/${id}` : '/api/worldsettings';
        const method = id ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    setting_id: settingId,
                    title: title,
                    description: document.getElementById('inputDesc').value,
                    keywords: keywords // 키워드 저장
                })
            });
            if (res.ok) {
                closeModal('worldModal');
                loadWorldSettings();
            }
        } catch(e) { alert("오류"); }
    }

    async function deleteWorldSetting(e, id) {
        e.stopPropagation();
        if(!confirm("삭제하시겠습니까?")) return;
        await fetch(`/api/worldsettings/${id}`, { method: 'DELETE' });
        loadWorldSettings();
    }

    init();
</script>
